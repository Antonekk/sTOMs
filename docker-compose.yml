# Dev: docker compose up
services:
  db:
    image: postgres:16
    env_file: .env.dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env.dev
    environment:
      SEED_IF_EMPTY: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    env_file: .env.dev
    environment:
      SKIP_STARTUP: "1"
    command: celery -A stoms worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - db
      - redis

  celery-beat:
    build: ./backend
    env_file: .env.dev
    environment:
      SKIP_STARTUP: "1"
    command: celery -A stoms beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - db
      - redis

  frontend:
    build: ./frontend
    env_file: .env.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  storybook:
    build: ./frontend
    env_file: .env.dev
    ports:
      - "6006:6006"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: yarn storybook

volumes:
  pgdata:
