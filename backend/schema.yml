components:
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    AppUser:
      type: object
      properties:
        phone_number:
          type: string
          title: Numer telefonu
          pattern: ^(?:\+48)?\d{9}$
          maxLength: 15
        first_name:
          type: string
          title: Imię
          maxLength: 64
        last_name:
          type: string
          title: Nazwisko
          maxLength: 64
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Adres email
        patients:
          type: array
          items:
            $ref: '#/components/schemas/Patient'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          title: Rola
      required:
      - email
      - first_name
      - id
      - last_name
      - patients
      - phone_number
    AppUserCreatePasswordRetype:
      type: object
      properties:
        phone_number:
          type: string
          title: Numer telefonu
          pattern: ^(?:\+48)?\d{9}$
          maxLength: 15
