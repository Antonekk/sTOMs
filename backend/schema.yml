components:
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    AppUser:
      type: object
      properties:
        phone_number:
          type: string
          title: Numer telefonu
          pattern: ^\+48\d{9}$
          maxLength: 15
        first_name:
          type: string
          title: Imię
          maxLength: 64
        last_name:
          type: string
          title: Nazwisko
          maxLength: 64
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Adres email
        patients:
          type: array
          items:
            $ref: '#/components/schemas/Patient'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          title: Rola
      required:
      - email
      - first_name
      - id
      - last_name
      - patients
      - phone_number
    AppUserCreatePasswordRetype:
      type: object
      properties:
        phone_number:
          type: string
          title: Numer telefonu
          pattern: ^\+48\d{9}$
          maxLength: 15
        first_name:
          type: string
          title: Imię
          maxLength: 64
        last_name:
          type: string
          title: Nazwisko
          maxLength: 64
        email:
          type: string
          format: email
          title: Adres email
          maxLength: 254
        id:
          type: string
          format: uuid
          readOnly: true
        password:
          type: string
          writeOnly: true
        date_of_birth:
          type: string
          format: date
          writeOnly: true
        re_password:
          type: string
      required:
      - date_of_birth
      - email
      - first_name
      - id
      - last_name
      - password
      - phone_number
      - re_password
    AppointmentClient:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        appointment_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        final_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        therapist_name:
          type: string
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        appointment_type_name:
          type: string
          readOnly: true
        start_time:
          type: string
          format: time
          readOnly: true
        end_time:
          type: string
          format: time
          readOnly: true
        office:
          nullable: true
          readOnly: true
      required:
      - appointment_date
      - appointment_type_name
      - end_time
      - final_price
      - id
      - office
      - patient_name
      - start_time
      - therapist_name
    AppointmentSeriesCreate:
      type: object
      properties:
        therapist_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        appointment_type_id:
          type: string
          format: uuid
        start_time:
          type: string
          format: time
        start_date:
          type: string
          format: date
        is_weekly:
          type: boolean
          default: false
      required:
      - appointment_type_id
      - patient_id
      - start_date
      - start_time
      - therapist_id
    AppointmentSeriesDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: '#/components/schemas/AppointmentSeriesStatusEnum'
        therapist_name:
          type: string
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        appointment_type_name:
          type: string
          readOnly: true
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        start_date:
          type: string
          format: date
        recurrence_display:
          type: string
          nullable: true
          readOnly: true
        office:
          nullable: true
          readOnly: true
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentSummary'
          readOnly: true
      required:
      - appointment_type_name
      - appointments
      - end_time
      - id
      - office
      - patient_name
      - recurrence_display
      - start_date
      - start_time
      - therapist_name
    AppointmentSeriesList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: '#/components/schemas/AppointmentSeriesStatusEnum'
        therapist_name:
          type: string
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        appointment_type_name:
          type: string
          readOnly: true
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        start_date:
          type: string
          format: date
        recurrence_display:
          type: string
          nullable: true
          readOnly: true
        office:
          nullable: true
          readOnly: true
      required:
      - appointment_type_name
      - end_time
      - id
      - office
      - patient_name
      - recurrence_display
      - start_date
      - start_time
      - therapist_name
    AppointmentSeriesStatusEnum:
      enum:
      - ACTIVE
      - ENDED
      - CANCELED
      type: string
      description: |-
        * `ACTIVE` - Aktywna
        * `ENDED` - Zakończona
        * `CANCELED` - Anulowana
    AppointmentStatusEnum:
      enum:
      - SCHEDULED
      - COMPLETED
      - CANCELED
      type: string
      description: |-
        * `SCHEDULED` - Zaplanowana
        * `COMPLETED` - Zakończona
        * `CANCELED` - Anulowana
    AppointmentStatusUpdateStatusEnum:
      enum:
      - COMPLETED
      - CANCELED
      type: string
      description: |-
        * `COMPLETED` - COMPLETED
        * `CANCELED` - CANCELED
    AppointmentSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        appointment_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        final_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
      required:
      - appointment_date
      - final_price
      - id
    AppointmentTherapist:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        appointment_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        final_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        therapist_name:
          type: string
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        appointment_type_name:
          type: string
          readOnly: true
        start_time:
          type: string
          format: time
          readOnly: true
        end_time:
          type: string
          format: time
          readOnly: true
        office:
          nullable: true
          readOnly: true
        notes:
          type: string
          nullable: true
      required:
      - appointment_date
      - appointment_type_name
      - end_time
      - final_price
      - id
      - office
      - patient_name
      - start_time
      - therapist_name
    AppointmentType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        duration_time_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        is_periodic:
          type: boolean
      required:
      - duration_time_minutes
      - id
      - name
      - price
    AvailabilityDay:
      type: object
      properties:
        therapist_id:
          type: string
          format: uuid
        therapist_name:
          type: string
        office_id:
          type: string
          format: uuid
          nullable: true
        localization:
          type: string
          nullable: true
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
      required:
      - date
      - localization
      - office_id
      - slots
      - therapist_id
      - therapist_name
    AvailabilitySlot:
      type: object
