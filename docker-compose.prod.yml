# Prod: docker compose -f docker-compose.prod.yml up
services:
  db:
    image: postgres:16
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    env_file:
      - .env.prod
      - .env
    environment:
      COLLECT_STATIC: "1"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    env_file:
      - .env.prod
      - .env
    environment:
      SKIP_STARTUP: "1"
    command: celery -A stoms worker --loglevel=info
    depends_on:
      - backend
      - db
      - redis

  celery-beat:
    build: ./backend
    env_file:
      - .env.prod
      - .env
    environment:
      SKIP_STARTUP: "1"
    command: celery -A stoms beat --loglevel=info
    depends_on:
      - backend
      - db
      - redis

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - static_volume:/static:ro

volumes:
  pgdata:
  static_volume:
